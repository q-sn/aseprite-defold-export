name: Build Aseprite-Defold-Export Extension

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.x"
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r ci/requirements.txt
    
    - name: Extract version from package.json
      id: get_version
      run: |
        VERSION=$(python -c "import json; print(json.load(open('package.json'))['version'])")
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "Building version: $VERSION"
    
    - name: Build extension
      run: |
        python3 ci/release.py --release
    
    - name: List generated files
      run: |
        ls -la *.aseprite-extension || echo "No extension files found"
    
    - name: Upload artifact
      if: startsWith(github.ref, 'refs/heads/')
      uses: actions/upload-artifact@v4
      with:
        name: aseprite-defold-export-v${{ steps.get_version.outputs.version }}
        path: aseprite-defold-export.v${{ steps.get_version.outputs.version }}.aseprite-extension
        if-no-files-found: error
    
    - name: Create GitHub Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: aseprite-defold-export.v${{ steps.get_version.outputs.version }}.aseprite-extension
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    # Placeholder for future tests
    # - name: Run tests
    #   run: |
    #     python -m pytest tests/

